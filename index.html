<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部品相場調査 | 房総レッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1a18;
    --text-sub: #6b6960;
    --blue: #1a4fa0;
    --blue-light: #e8eef8;
    --green: #0f6e56;
    --green-light: #e4f3ee;
    --red: #993c1d;
    --red-light: #faeae4;
    --accent: #1a4fa0;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 40px;
  }

  header {
    background: var(--blue);
    color: #fff;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 { font-size: 16px; font-weight: 500; letter-spacing: 0.03em; }
  header span { font-size: 11px; opacity: 0.7; margin-left: auto; }

  .container { max-width: 560px; margin: 0 auto; padding: 20px 16px 0; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text-sub);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .photo-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
    margin-bottom: 10px;
  }
  .photo-area:hover { background: var(--bg); border-color: var(--blue); }
  .photo-area input[type=file] { position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
  .photo-icon { font-size: 32px; margin-bottom: 6px; }
  .photo-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .photo-sub { font-size: 12px; color: var(--text-sub); margin-top: 3px; }

  .preview-wrap { position: relative; display: inline-block; margin-bottom: 6px; }
  .preview-wrap img { max-height: 140px; max-width: 100%; border-radius: var(--radius-sm); display: block; }
  .del-btn {
    position: absolute; top: -8px; right: -8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-sub); font-size: 13px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  .recognize-btn {
    width: 100%; padding: 10px; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--blue-light); color: var(--blue);
    border: 1px solid #b8cae8; border-radius: var(--radius-sm);
    cursor: pointer; margin-bottom: 10px; display: none;
  }
  .recognize-btn:disabled { opacity: 0.5; cursor: default; }

  .status-msg {
    font-size: 12px; color: var(--text-sub);
    min-height: 20px; margin-bottom: 6px; line-height: 1.5;
  }

  .form-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
  .form-group label { font-size: 12px; color: var(--text-sub); font-weight: 500; }

  input[type=text], select {
    width: 100%; padding: 9px 10px;
    font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface); color: var(--text);
    outline: none; transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input[type=text]:focus, select:focus { border-color: var(--blue); }

  .search-btn {
    width: 100%; padding: 13px;
    font-size: 15px; font-weight: 700;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--blue); color: #fff;
    border: none; border-radius: var(--radius);
    cursor: pointer; letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .search-btn:active { opacity: 0.85; }
  .search-btn:disabled { opacity: 0.5; cursor: default; }

  .result-card { display: none; }

  .result-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 14px; gap: 8px;
  }
  .result-title { font-size: 15px; font-weight: 700; line-height: 1.4; }
  .trend-badge {
    font-size: 12px; font-weight: 700; padding: 3px 10px;
    border-radius: 20px; white-space: nowrap; flex-shrink: 0;
  }
  .trend-up { background: var(--green-light); color: var(--green); }
  .trend-down { background: var(--red-light); color: var(--red); }
  .trend-flat { background: #f0ede8; color: var(--text-sub); }

  .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric {
    background: var(--bg); border-radius: var(--radius-sm);
    padding: 12px 8px; text-align: center;
  }
  .metric-label { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }
  .metric-value { font-size: 18px; font-weight: 700; color: var(--text); }
  .metric-value.main { color: var(--blue); font-size: 22px; }

  .trend-reason { font-size: 12px; color: var(--text-sub); margin-bottom: 4px; }
  .sample-count { font-size: 11px; color: var(--text-sub); }
  .note-text { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .copy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .copy-btn {
    padding: 11px 8px; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    cursor: pointer; text-align: center;
    transition: background 0.1s;
  }
  .copy-btn:active { background: var(--border); }
  .copy-success {
    font-size: 12px; color: var(--green);
    text-align: center; margin-top: 8px; min-height: 18px;
  }

  .loading { display: inline-flex; align-items: center; gap: 6px; }
  .loading::after {
    content: '';
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 400px) {
    .form-row { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr 1fr; }
    .metric-value { font-size: 15px; }
    .metric-value.main { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔍 部品相場調査</h1>
  </div>
  <span>房総レッカー</span>
</header>

<div class="container">

  <!-- 写真認識 -->
  <div class="card">
    <div class="section-label">📷 写真で認識</div>
    <div class="photo-area" id="photoArea" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none" onchange="onFileChange(event)" />
      <div id="photoPrompt">
        <div class="photo-icon">📷</div>
        <div class="photo-text">写真を撮影 / 選択</div>
        <div class="photo-sub">部品名・車種を自動認識します</div>
      </div>
      <div id="previewArea" style="display:none;">
        <div class="preview-wrap">
          <img id="previewImg" src="" alt="部品プレビュー" />
          <button class="del-btn" onclick="clearPhoto(event)">×</button>
        </div>
      </div>
    </div>
    <button class="recognize-btn" id="recognizeBtn" onclick="recognizePhoto()">AI で部品を認識する</button>
    <div class="status-msg" id="recognizeStatus"></div>
  </div>

  <!-- 部品情報入力 -->
  <div class="card">
    <div class="section-label">📝 部品情報</div>
    <div class="form-row">
      <div class="form-group" style="margin:0;">
        <label>部品名</label>
        <input type="text" id="partName" placeholder="例：オルタネーター" />
      </div>
      <div class="form-group" style="margin:0;">
        <label>車種</label>
        <input type="text" id="carModel" placeholder="例：ハイエース" />
      </div>
      <div class="form-group" style="margin:0;">
        <label>年式・型式</label>
        <input type="text" id="carYear" placeholder="例：200系" />
      </div>
    </div>
    <div class="form-group">
      <label>状態</label>
      <select id="condition">
        <option value="中古">中古（動作確認済）</option>
        <option value="ジャンク">ジャンク品</option>
        <option value="良品">良品（低走行）</option>
        <option value="状態不明">状態不明</option>
      </select>
    </div>
  </div>

  <button class="search-btn" id="searchBtn" onclick="runSearch()">相場を調べる</button>
  <div class="status-msg" id="searchStatus" style="margin-top:10px; text-align:center;"></div>

  <!-- 結果 -->
  <div class="card result-card" id="resultCard" style="margin-top:12px;">
    <div class="result-header">
      <div class="result-title" id="resultTitle"></div>
      <div class="trend-badge" id="trendBadge"></div>
    </div>
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">平均落札</div>
        <div class="metric-value main" id="avgPrice">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">最高値</div>
        <div class="metric-value" id="maxPrice">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">最安値</div>
        <div class="metric-value" id="minPrice">-</div>
      </div>
    </div>
    <div class="trend-reason" id="trendReason"></div>
    <div class="sample-count" id="sampleCount"></div>
    <div class="note-text" id="noteText"></div>

    <div class="divider"></div>
    <div class="section-label">📤 共有</div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyText('simple')">📋 シンプルコピー</button>
      <button class="copy-btn" onclick="copyText('line')">💬 LINE用コピー</button>
    </div>
    <div class="copy-success" id="copyMsg"></div>
  </div>

</div>

<script>
  let lastData = null;
  let currentImageBase64 = null;
  let currentImageType = 'image/jpeg';
  const API_URL = 'https://api.anthropic.com/v1/messages';

  function onFileChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    currentImageType = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = ev => {
      currentImageBase64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('photoPrompt').style.display = 'none';
      document.getElementById('previewArea').style.display = 'block';
      document.getElementById('photoArea').style.cursor = 'default';
      document.getElementById('recognizeBtn').style.display = 'block';
      document.getElementById('recognizeStatus').textContent = '写真を読み込みました。「AIで部品を認識する」を押してください。';
    };
    reader.readAsDataURL(file);
  }

  function clearPhoto(e) {
    e.stopPropagation();
    currentImageBase64 = null;
    document.getElementById('previewImg').src = '';
    document.getElementById('photoPrompt').style.display = 'block';
    document.getElementById('previewArea').style.display = 'none';
    document.getElementById('recognizeBtn').style.display = 'none';
    document.getElementById('recognizeStatus').textContent = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('photoArea').style.cursor = 'pointer';
  }

  async function recognizePhoto() {
    if (!currentImageBase64) return;
    const btn = document.getElementById('recognizeBtn');
    btn.disabled = true;
    document.getElementById('recognizeStatus').innerHTML = '<span class="loading">AIが部品を認識中</span>';
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 500,
          system: `自動車部品の専門家です。写真を分析しJSON形式のみで返答してください。
{"part":"部品名","car":"推定車種（不明なら空）","year":"推定年式（不明なら空）","condition":"中古 または ジャンク品 または 良品 または 状態不明","confidence":"high または medium または low","memo":"特記事項20文字以内"}`,
          messages: [{ role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImageBase64 } },
            { type: 'text', text: 'この自動車部品を分析してください。' }
          ]}]
        })
      });
      const data = await res.json();
      const text = data.content.find(b => b.type === 'text')?.text || '';
      const parsed = JSON.parse((text.match(/\{[\s\S]*\}/) || ['{}'])[0]);
      if (parsed.part) document.getElementById('partName').value = parsed.part;
      if (parsed.car) document.getElementById('carModel').value = parsed.car;
      if (parsed.year) document.getElementById('carYear').value = parsed.year;
      if (parsed.condition) {
        const sel = document.getElementById('condition');
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === parsed.condition) { sel.selectedIndex = i; break; }
        }
      }
      const conf = { high: '高', medium: '中', low: '低' }[parsed.confidence] || '中';
      document.getElementById('recognizeStatus').textContent =
        `認識完了（精度：${conf}）${parsed.memo ? '　' + parsed.memo : ''}　内容を確認・修正してから相場を調べてください。`;
    } catch(e) {
      document.getElementById('recognizeStatus').textContent = '認識失敗。手動で入力してください。';
    }
    btn.disabled = false;
  }

  async function runSearch() {
    const part = document.getElementById('partName').value.trim();
    const car = document.getElementById('carModel').value.trim();
    const year = document.getElementById('carYear').value.trim();
    const cond = document.getElementById('condition').value;
    if (!part) { document.getElementById('searchStatus').textContent = '部品名を入力してください'; return; }

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    document.getElementById('searchStatus').innerHTML = '<span class="loading">ヤフオク落札相場を調査中</span>';
    document.getElementById('resultCard').style.display = 'none';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          system: `ヤフオク自動車部品相場調査の専門家です。Web検索でヤフオクの落札履歴を調べ、JSON形式のみで返答してください。
{"avg":整数,"max":整数,"min":整数,"count":件数,"trend":"up/down/flat","trend_reason":"20文字以内","note":"30文字以内"}`,
          messages: [{ role: 'user', content: `「${[part,car,year,cond].filter(Boolean).join(' ')}」のヤフオク落札相場を調査してください。` }]
        })
      });
      const data = await res.json();
      const text = data.content.find(b => b.type === 'text')?.text || '';
      const parsed = JSON.parse((text.match(/\{[\s\S]*\}/) || ['{}'])[0]);
      lastData = { part, car, year, cond, ...parsed };

      document.getElementById('resultTitle').textContent =
        `${part}${car ? ' / ' + car : ''}${year ? ' ' + year : ''} [${cond}]`;
      document.getElementById('avgPrice').textContent = '¥' + (parsed.avg||0).toLocaleString();
      document.getElementById('maxPrice').textContent = '¥' + (parsed.max||0).toLocaleString();
      document.getElementById('minPrice').textContent = '¥' + (parsed.min||0).toLocaleString();

      const badge = document.getElementById('trendBadge');
      if (parsed.trend === 'up') { badge.textContent = '↑ 上昇'; badge.className = 'trend-badge trend-up'; }
      else if (parsed.trend === 'down') { badge.textContent = '↓ 下落'; badge.className = 'trend-badge trend-down'; }
      else { badge.textContent = '→ 横ばい'; badge.className = 'trend-badge trend-flat'; }

      document.getElementById('trendReason').textContent = parsed.trend_reason || '';
      document.getElementById('sampleCount').textContent = parsed.count ? `参考件数：約${parsed.count}件` : '';
      document.getElementById('noteText').textContent = parsed.note || '';
      document.getElementById('searchStatus').textContent = '';
      document.getElementById('resultCard').style.display = 'block';
    } catch(e) {
      document.getElementById('searchStatus').textContent = 'エラーが発生しました。もう一度お試しください。';
    }
    btn.disabled = false;
  }

  function copyText(type) {
    if (!lastData) return;
    const d = lastData;
    const now = new Date();
    const dt = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    const trendLabel = { up:'↑上昇', down:'↓下落', flat:'→横ばい' }[d.trend] || '';
    let text = '';
    if (type === 'simple') {
      text = `【相場調査】${dt}\n部品：${d.part}${d.car ? ' / '+d.car : ''}${d.year ? ' '+d.year : ''}\n状態：${d.cond}\n平均落札：¥${(d.avg||0).toLocaleString()}\n最高値：¥${(d.max||0).toLocaleString()}　最安値：¥${(d.min||0).toLocaleString()}\nトレンド：${trendLabel}${d.trend_reason ? ' '+d.trend_reason : ''}${d.note ? '\n備考：'+d.note : ''}`;
    } else {
      text = `📦 部品相場 ${dt}\n━━━━━━━━━━━━━\n${d.part}${d.car ? ' / '+d.car : ''}${d.year ? ' '+d.year : ''}\n[${d.cond}]\n━━━━━━━━━━━━━\n平均 ¥${(d.avg||0).toLocaleString()}\n高値 ¥${(d.max||0).toLocaleString()}\n安値 ¥${(d.min||0).toLocaleString()}\n${trendLabel}${d.trend_reason ? ' '+d.trend_reason : ''}${d.note ? '\n'+d.note : ''}\n━━━━━━━━━━━━━`;
    }
    navigator.clipboard.writeText(text).then(() => {
      const msg = document.getElementById('copyMsg');
      msg.textContent = type === 'line' ? 'LINEに貼り付けできます ✓' : 'クリップボードにコピーしました ✓';
      setTimeout(() => { msg.textContent = ''; }, 3000);
    }).catch(() => {
      document.getElementById('copyMsg').textContent = 'コピーできませんでした。';
    });
  }
</script>
</body>
</html>
